services:
  - type: web
    name: gestifyadm
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "backend.main:app" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
